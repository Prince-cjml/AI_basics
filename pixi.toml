[project]
name = "cnn_cifar_test"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.0"
cuda-toolkit = "13.0.*"
cuda-nvcc = "13.0.*"
matplotlib = "3.10.8"

[pypi-dependencies]
torch = { version = "2.11.0", find-links = "https://download.pytorch.org/whl/cu130/torch_stable.html" }
torchvision = { version = "0.26.0", find-links = "https://download.pytorch.org/whl/cu130/torch_stable.html" }
wandb = "0.26.0"

[system-requirements]
cuda = "13.0"